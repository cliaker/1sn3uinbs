<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Knowledge Flow Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'DM Sans',sans-serif;
  background:#f0f2f5;
  color:#2d3748;
  overflow:hidden;
  height:100vh;
  width:100vw;
}

#map-container {
  position:absolute; top:0; left:0; right:0; bottom:0;
}

svg { width:100%; height:100%; }

.land { fill:#e2e6ec; stroke:#cdd3dc; stroke-width:0.5; }
.border { fill:none; stroke:#cdd3dc; stroke-width:0.3; }

/* Animated flow on default arcs */
.arc-flow {
  animation: flowDash 1.5s linear infinite;
}
@keyframes flowDash {
  to { stroke-dashoffset: -12; }
}

/* Top bar */
#topbar {
  position:absolute; top:0; left:0; right:0;
  padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg,rgba(240,242,245,0.95),rgba(240,242,245,0));
  pointer-events:none; z-index:10;
}
#topbar > * { pointer-events:auto; }
#title {
  font-size:18px; font-weight:700; color:#1a202c;
  letter-spacing:-0.3px;
}
#subtitle { font-size:12px; color:#718096; margin-top:2px; }

/* Controls */
#controls {
  display:flex; gap:8px; align-items:center;
}
.btn {
  font-family:'DM Sans',sans-serif;
  padding:7px 16px; border-radius:6px;
  border:1px solid #cbd5e0; background:#fff;
  color:#4a5568; font-size:13px; font-weight:500;
  cursor:pointer; transition:all 0.15s;
}
.btn:hover { border-color:#a0aec0; color:#2d3748; }
.btn.active { background:#ebf4ff; border-color:#4a6cf7; color:#3b5bdb; }
.btn-reset {
  font-family:'DM Sans',sans-serif;
  padding:7px 14px; border-radius:6px;
  border:1px solid #cbd5e0; background:#fff;
  color:#4a5568; font-size:13px; font-weight:500;
  cursor:pointer; transition:all 0.15s;
}
.btn-reset:hover { border-color:#f87171; color:#e53e3e; }

/* Info panel */
#info-panel {
  position:absolute; bottom:20px; left:20px;
  background:rgba(255,255,255,0.95); border:1px solid #e2e8f0;
  border-radius:10px; padding:16px 20px;
  min-width:280px; max-width:340px;
  max-height:60vh; overflow-y:auto;
  backdrop-filter:blur(12px);
  z-index:10; font-size:13px;
  transition:opacity 0.2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
#info-panel::-webkit-scrollbar { width:4px; }
#info-panel::-webkit-scrollbar-thumb { background:#cbd5e0; border-radius:4px; }

#info-panel h3 {
  font-size:15px; font-weight:700; color:#1a202c;
  margin-bottom:4px;
}
.info-stat {
  display:flex; justify-content:space-between;
  padding:3px 0; border-bottom:1px solid #e2e8f0;
}
.info-stat:last-child { border:none; }
.info-label { color:#718096; }
.info-value { color:#2d3748; font-family:'JetBrains Mono',monospace; font-size:12px; }

#edge-list { margin-top:10px; }
#edge-list .edge-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:4px 0; border-bottom:1px solid rgba(226,232,240,0.7);
  font-size:12px;
}
.edge-country { color:#2d3748; }
.edge-weight { font-family:'JetBrains Mono',monospace; color:#718096; font-size:11px; }
.edge-bar {
  height:3px; background:#4a6cf7; border-radius:2px;
  margin-top:2px; min-width:2px; transition:width 0.3s;
}

/* Legend */
#legend {
  position:absolute; bottom:20px; right:20px;
  background:rgba(255,255,255,0.95); border:1px solid #e2e8f0;
  border-radius:10px; padding:14px 18px;
  z-index:10; font-size:11px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
#legend h4 { font-size:12px; font-weight:700; color:#1a202c; margin-bottom:8px; }
.legend-row { display:flex; align-items:center; gap:8px; margin:4px 0; }
.legend-dot { width:10px; height:10px; border-radius:50%; }
.legend-gradient {
  width:120px; height:10px; border-radius:3px;
  margin:6px 0;
}
.legend-labels { display:flex; justify-content:space-between; width:120px; font-size:10px; color:#718096; }

/* Tooltip */
#tooltip {
  position:absolute; pointer-events:none;
  background:rgba(255,255,255,0.95); border:1px solid #e2e8f0;
  border-radius:6px; padding:8px 12px;
  font-size:12px; color:#1a202c;
  z-index:20; display:none;
  backdrop-filter:blur(8px);
  white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Default mode label */
#mode-label {
  position:absolute; top:60px; left:50%; transform:translateX(-50%);
  font-size:12px; color:#718096;
  background:rgba(255,255,255,0.9); padding:5px 14px;
  border-radius:20px; border:1px solid #e2e8f0;
  z-index:10; transition:opacity 0.2s;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
</style>
</head>
<body>
<div id="map-container"></div>

<div id="topbar">
  <div>
    <div id="title">Global Science→Policy Knowledge Flow</div>
    <div id="subtitle">Fractional affiliation-weighted citation network</div>
  </div>
  <div id="controls">
    <button class="btn active" id="btn-outflow" onclick="setMode('out')">Outflow</button>
    <button class="btn" id="btn-inflow" onclick="setMode('in')">Inflow</button>
    <button class="btn-reset" id="btn-reset" onclick="resetView()">Reset</button>
  </div>
</div>

<div id="mode-label">Top 30 global knowledge flows — click a country to explore</div>

<div id="info-panel">
  <h3 id="panel-title">Global Overview</h3>
  <div id="panel-stats"></div>
  <div id="edge-list"></div>
</div>

<div id="legend">
  <h4>Node Color — Net Flow Ratio</h4>
  <div class="legend-gradient" id="legend-grad"></div>
  <div class="legend-labels"><span>Policy consumer</span><span>Research producer</span></div>
  <div style="margin-top:10px;">
    <h4>Node Size</h4>
    <div style="color:#718096;">Total knowledge flow (in + out)</div>
  </div>
</div>

<div id="tooltip"></div>

// ============ SETUP ============
const countries = DATA.c;
const edges = DATA.e;
const nodes = DATA.n;
const positions = DATA.pos;

// Override EU/IGO positions to Antarctica region
const euIdx = countries.indexOf('EU');
const igoIdx = countries.indexOf('IGO');
if(euIdx >= 0) positions[euIdx] = [15, -74];
if(igoIdx >= 0) positions[igoIdx] = [-15, -74];

// Build lookup indices
const outEdges = {}; // source_id -> [{target, weight}]
const inEdges = {};  // target_id -> [{source, weight}]
edges.forEach(([s,t,w]) => {
  if(!outEdges[s]) outEdges[s]=[];
  outEdges[s].push({target:t, weight:w});
  if(!inEdges[t]) inEdges[t]=[];
  inEdges[t].push({source:s, weight:w});
});

// Node metrics
const nodeMeta = countries.map((name,i) => {
  const [ow,iw] = nodes[i];
  const total = ow+iw;
  const ratio = total>0 ? (ow-iw)/total : 0;
  return {name, id:i, out:ow, in:iw, total, ratio, pos:positions[i]};
});

// Color scale: diverging blue (consumer) -> purple (balanced) -> orange (producer)
const colorScale = d3.scaleLinear()
  .domain([-1, -0.3, 0, 0.3, 1])
  .range(['#3b82f6','#6366f1','#8b5cf6','#f59e0b','#ef4444'])
  .clamp(true);

// Size scale
const maxTotal = d3.max(nodeMeta, d=>d.total);
const sizeScale = d3.scalePow().exponent(0.4)
  .domain([0, maxTotal])
  .range([1.5, 28]);

// State
let mode = 'out';
let selectedCountry = null;

// ============ MAP ============
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#map-container').append('svg')
  .attr('viewBox', `0 0 ${width} ${height}`);

const projection = d3.geoNaturalEarth1()
  .scale(width/5.5)
  .translate([width/2, height/2+20]);

const path = d3.geoPath().projection(projection);

const g = svg.append('g');

const mapLayer = g.append('g');
const arcLayer = g.append('g');
const nodeLayer = g.append('g');

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.8, 12])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// Load world map
d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  const land = topojson.feature(world, world.objects.countries);
  const borders = topojson.mesh(world, world.objects.countries, (a,b)=>a!==b);

  mapLayer.selectAll('path.land')
    .data(land.features).enter().append('path')
    .attr('class','land').attr('d', path);

  mapLayer.append('path').datum(borders)
    .attr('class','border').attr('d', path);

  drawNodes();
  drawDefaultArcs();
  showGlobalInfo();
});

// ============ NODES ============
function getNodePos(d) {
  return projection(d.pos);
}

function drawNodes() {
  const visibleNodes = nodeMeta.filter(d => d.total > 0);

  nodeLayer.selectAll('circle.node')
    .data(visibleNodes, d=>d.id)
    .enter().append('circle')
    .attr('class','node')
    .attr('cx', d => getNodePos(d)[0])
    .attr('cy', d => getNodePos(d)[1])
    .attr('r', d => sizeScale(d.total))
    .attr('fill', d => colorScale(d.ratio))
    .attr('fill-opacity', 0.85)
    .attr('stroke', '#fff')
    .attr('stroke-width', 0.8)
    .style('cursor','pointer')
    .on('mouseover', function(e,d) {
      showTooltip(e, d);
      d3.select(this).attr('fill-opacity',1).attr('stroke','#2d3748').attr('stroke-width',1.5);
    })
    .on('mouseout', function(e,d) {
      hideTooltip();
      d3.select(this).attr('fill-opacity',0.85).attr('stroke','#fff').attr('stroke-width',0.8);
    })
    .on('click', function(e,d) {
      e.stopPropagation();
      selectCountry(d.id);
    });

  // Labels for EU and IGO
  [euIdx, igoIdx].filter(i=>i>=0).forEach(idx => {
    const meta = nodeMeta[idx];
    const p = projection(positions[idx]);
    const r = sizeScale(meta.total);
    nodeLayer.append('text')
      .attr('x', p[0])
      .attr('y', p[1] + r + 14)
      .attr('text-anchor','middle')
      .attr('fill','#4a5568')
      .attr('font-size','11px')
      .attr('font-family','DM Sans,sans-serif')
      .text(meta.name);
  });
}

// ============ ARCS ============
function makeArc(s, t) {
  const sNode = nodeMeta[s], tNode = nodeMeta[t];
  const p0 = getNodePos(sNode);
  const p1 = getNodePos(tNode);
  if(!p0 || !p1) return null;
  const dx = p1[0]-p0[0], dy = p1[1]-p0[1];
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist < 1) return null;
  const mx = (p0[0]+p1[0])/2, my = (p0[1]+p1[1])/2;
  const offset = Math.min(dist*0.2, 60);
  const cx = mx - dy/dist*offset;
  const cy = my + dx/dist*offset;
  return `M${p0[0]},${p0[1]} Q${cx},${cy} ${p1[0]},${p1[1]}`;
}

function drawArcs(edgeData, highlightColor) {
  arcLayer.selectAll('*').remove();

  if(edgeData.length === 0) return;

  const maxW = d3.max(edgeData, d=>d.weight);
  const wScale = d3.scalePow().exponent(0.5)
    .domain([0, maxW]).range([0.3, 5]);
  const oScale = d3.scaleLinear()
    .domain([0, maxW]).range([0.15, 0.7]);

  edgeData.sort((a,b) => a.weight - b.weight);

  arcLayer.selectAll('path.arc')
    .data(edgeData)
    .enter().append('path')
    .attr('class','arc')
    .attr('d', d => makeArc(d.source, d.target))
    .attr('fill','none')
    .attr('stroke', highlightColor || '#4a6cf7')
    .attr('stroke-width', d => wScale(d.weight))
    .attr('stroke-opacity', d => oScale(d.weight))
    .attr('stroke-linecap','round');
}

// ============ DEFAULT ARCS ============
function drawDefaultArcs() {
  arcLayer.selectAll('*').remove();
  d3.select('#mode-label').text('Top 30 global knowledge flows — click a country to explore');

  const top = edges
    .filter(([s,t,w]) => s !== t)
    .sort((a,b) => b[2] - a[2])
    .slice(0, 30)
    .map(([s,t,w]) => ({source:s, target:t, weight:w}));

  if(top.length === 0) return;

  const maxW = d3.max(top, d=>d.weight);
  const wScale = d3.scalePow().exponent(0.5)
    .domain([0, maxW]).range([0.5, 5]);
  const oScale = d3.scaleLinear()
    .domain([0, maxW]).range([0.25, 0.75]);

  top.sort((a,b) => a.weight - b.weight);

  // Background static arc (subtle)
  arcLayer.selectAll('path.arc-bg')
    .data(top)
    .enter().append('path')
    .attr('class','arc-bg')
    .attr('d', d => makeArc(d.source, d.target))
    .attr('fill','none')
    .attr('stroke','#6c63ac')
    .attr('stroke-width', d => wScale(d.weight))
    .attr('stroke-opacity', d => oScale(d.weight) * 0.3)
    .attr('stroke-linecap','round');

  // Animated flowing arc on top
  arcLayer.selectAll('path.arc-flow')
    .data(top)
    .enter().append('path')
    .attr('class','arc-flow')
    .attr('d', d => makeArc(d.source, d.target))
    .attr('fill','none')
    .attr('stroke','#6c63ac')
    .attr('stroke-width', d => wScale(d.weight) * 0.8)
    .attr('stroke-opacity', d => oScale(d.weight))
    .attr('stroke-dasharray','4 8')
    .attr('stroke-linecap','round');
}

// ============ INTERACTION ============
function setMode(m) {
  mode = m;
  d3.select('#btn-outflow').classed('active', m==='out');
  d3.select('#btn-inflow').classed('active', m==='in');
  if(selectedCountry !== null) {
    selectCountry(selectedCountry);
  }
}

function selectCountry(id) {
  selectedCountry = id;
  const name = countries[id];
  const meta = nodeMeta[id];

  d3.select('#mode-label').style('opacity', 0);

  // Highlight selected node
  nodeLayer.selectAll('circle.node')
    .attr('fill-opacity', d => d.id===id ? 1 : 0.25)
    .attr('stroke', d => d.id===id ? '#2d3748' : '#fff')
    .attr('stroke-width', d => d.id===id ? 2 : 0.8);

  let edgeData, listData;
  if(mode === 'out') {
    const raw = outEdges[id] || [];
    edgeData = raw.filter(d=>d.target!==id).map(d=>({source:id, target:d.target, weight:d.weight}));
    listData = raw.slice().sort((a,b)=>b.weight-a.weight).map(d=>({
      name: countries[d.target],
      weight: d.weight,
      isSelf: d.target===id
    }));
    drawArcs(edgeData, '#f59e0b');
  } else {
    const raw = inEdges[id] || [];
    edgeData = raw.filter(d=>d.source!==id).map(d=>({source:d.source, target:id, weight:d.weight}));
    listData = raw.slice().sort((a,b)=>b.weight-a.weight).map(d=>({
      name: countries[d.source],
      weight: d.weight,
      isSelf: d.source===id
    }));
    drawArcs(edgeData, '#3b82f6');
  }

  // Also highlight target/source nodes
  const connectedIds = new Set(edgeData.map(d => mode==='out' ? d.target : d.source));
  connectedIds.add(id);
  nodeLayer.selectAll('circle.node')
    .attr('fill-opacity', d => connectedIds.has(d.id) ? 0.9 : 0.12);

  // Info panel
  showCountryInfo(name, meta, listData);
}

function resetView() {
  selectedCountry = null;
  d3.select('#mode-label').style('opacity', 1);
  nodeLayer.selectAll('circle.node')
    .attr('fill-opacity', 0.85)
    .attr('stroke','#fff')
    .attr('stroke-width', 0.8);
  drawDefaultArcs();
  showGlobalInfo();
}

svg.on('click', () => {
  if(selectedCountry !== null) resetView();
});

// ============ INFO PANEL ============
function fmt(n) {
  if(n >= 1000) return d3.format(',.0f')(n);
  if(n >= 1) return d3.format(',.1f')(n);
  return d3.format(',.3f')(n);
}

function showGlobalInfo() {
  const totalWeight = d3.sum(edges, d=>d[2]);
  const selfWeight = d3.sum(edges.filter(([s,t])=>s===t), d=>d[2]);
  d3.select('#panel-title').text('Global Overview');
  d3.select('#panel-stats').html(`
    <div class="info-stat"><span class="info-label">Total flow</span><span class="info-value">${fmt(totalWeight)}</span></div>
    <div class="info-stat"><span class="info-label">Self-citation share</span><span class="info-value">${(selfWeight/totalWeight*100).toFixed(1)}%</span></div>
    <div class="info-stat"><span class="info-label">Source countries</span><span class="info-value">${new Set(edges.map(d=>d[0])).size}</span></div>
    <div class="info-stat"><span class="info-label">Target countries</span><span class="info-value">${new Set(edges.map(d=>d[1])).size}</span></div>
    <div class="info-stat"><span class="info-label">Total edges</span><span class="info-value">${edges.length}</span></div>
  `);
  d3.select('#edge-list').html(`
    <div style="color:#718096;font-size:11px;margin-top:6px;">Top producers: USA, UK, Canada, Germany, Australia</div>
    <div style="color:#718096;font-size:11px;margin-top:3px;">Top consumers: USA, IGO, UK, Germany, Canada</div>
  `);
}

function showCountryInfo(name, meta, listData) {
  d3.select('#panel-title').text(name);
  d3.select('#panel-stats').html(`
    <div class="info-stat"><span class="info-label">Research output (out)</span><span class="info-value">${fmt(meta.out)}</span></div>
    <div class="info-stat"><span class="info-label">Policy citations (in)</span><span class="info-value">${fmt(meta.in)}</span></div>
    <div class="info-stat"><span class="info-label">Net flow ratio</span><span class="info-value">${meta.ratio.toFixed(3)}</span></div>
    <div class="info-stat"><span class="info-label">${mode==='out'?'Outflow':'Inflow'} connections</span><span class="info-value">${listData.length}</span></div>
  `);

  const maxW = listData.length > 0 ? listData[0].weight : 1;
  let html = '';
  listData.forEach(d => {
    const pct = (d.weight / maxW * 100);
    const selfTag = d.isSelf ? ' <span style="color:#a0aec0;font-size:10px;">(self)</span>' : '';
    html += `<div class="edge-row">
      <span class="edge-country">${d.name}${selfTag}</span>
      <span class="edge-weight">${fmt(d.weight)}</span>
    </div>
    <div class="edge-bar" style="width:${Math.max(pct,1)}%;"></div>`;
  });
  d3.select('#edge-list').html(html);
}

// ============ TOOLTIP ============
function showTooltip(event, d) {
  const tip = d3.select('#tooltip');
  const roleLabel = d.ratio > 0.3 ? 'Research producer' : d.ratio < -0.3 ? 'Policy consumer' : 'Balanced';
  tip.html(`<strong>${d.name}</strong><br>
    Out: ${fmt(d.out)} &nbsp; In: ${fmt(d.in)}<br>
    Ratio: ${d.ratio.toFixed(2)} (${roleLabel})`)
    .style('display','block')
    .style('left', (event.pageX+14)+'px')
    .style('top', (event.pageY-10)+'px');
}
function hideTooltip() {
  d3.select('#tooltip').style('display','none');
}

// Legend gradient
const grad = document.getElementById('legend-grad');
grad.style.background = 'linear-gradient(to right, #3b82f6, #6366f1, #8b5cf6, #f59e0b, #ef4444)';

</script>
